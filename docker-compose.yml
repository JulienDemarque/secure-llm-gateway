services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-llm-gateway-api
    environment:
      PORT: "3000"
      MONGODB_URI: "mongodb://mongo:27017/secure_llm_gateway"
      REDIS_URL: "redis://redis:6379"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OLLAMA_HOST: "${OLLAMA_HOST:-http://ollama:11434}"
      PROMPT_GUARD_MODEL: "${PROMPT_GUARD_MODEL:-llama3.1:8b}"
      PII_ENCRYPTION_KEY_ID: "${PII_ENCRYPTION_KEY_ID:-pii-key-v1}"
      PII_ENCRYPTION_KEY_B64: "${PII_ENCRYPTION_KEY_B64:-}"
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    container_name: secure-llm-gateway-api-dev
    command: npm run dev
    profiles: ["dev"]
    environment:
      PORT: "3000"
      MONGODB_URI: "mongodb://mongo:27017/secure_llm_gateway"
      REDIS_URL: "redis://redis:6379"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OLLAMA_HOST: "${OLLAMA_HOST:-http://ollama:11434}"
      PROMPT_GUARD_MODEL: "${PROMPT_GUARD_MODEL:-llama3.1:8b}"
      PROMPT_GUARD_DEBUG: "${PROMPT_GUARD_DEBUG:-}"
      PII_ENCRYPTION_KEY_ID: "${PII_ENCRYPTION_KEY_ID:-pii-key-v1}"
      PII_ENCRYPTION_KEY_B64: "${PII_ENCRYPTION_KEY_B64:-}"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - api_dev_node_modules:/app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: secure-llm-gateway-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: secure-llm-gateway-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  ollama:
    image: ollama/ollama:latest
    container_name: secure-llm-gateway-ollama
    environment:
      # Keep memory pressure predictable on local machines.
      OLLAMA_NUM_PARALLEL: "${OLLAMA_NUM_PARALLEL:-1}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-5m}"
    mem_limit: "${OLLAMA_MEM_LIMIT:-14g}"
    memswap_limit: "${OLLAMA_MEMSWAP_LIMIT:-16g}"
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12

volumes:
  api_dev_node_modules:
  mongo_data:
  redis_data:
  ollama_data:
