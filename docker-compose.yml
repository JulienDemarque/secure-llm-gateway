services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-llm-gateway-api
    environment:
      PORT: "3000"
      MONGODB_URI: "mongodb://mongo:27017/secure_llm_gateway"
      REDIS_URL: "redis://redis:6379"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PII_ENCRYPTION_KEY_ID: "${PII_ENCRYPTION_KEY_ID:-pii-key-v1}"
      PII_ENCRYPTION_KEY_B64: "${PII_ENCRYPTION_KEY_B64:-}"
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: secure-llm-gateway-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: secure-llm-gateway-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  mongo_data:
  redis_data:
